# Configuración del Tema
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# Plugins necesarios para que no dé error
plugins:
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

# Información Personal
author:
  name: "Joaquín Mendoza"
  bio: "Estudiante de Analista Programador"
  location: "Ñuñoa, Chile"
  avatar: "/assets/images/image-joaquin.png"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/joamendozacuevas"

# Ajustes de la página
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
